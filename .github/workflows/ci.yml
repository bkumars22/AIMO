name: AIMO CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# All 3 jobs must pass before a PR can be merged.
# Enable this in GitHub → Settings → Branches → Branch protection rules
# → Require status checks: test-ai-engine, test-backend, lint-frontend

jobs:

  # ── Python AI Engine ──────────────────────────────────────────
  test-ai-engine:
    name: AI Engine Tests (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: aimo_test
          POSTGRES_PASSWORD: aimo_test
          POSTGRES_DB: aimo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-engine/requirements.txt

      - name: Install dependencies
        working-directory: ai-engine
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: ai-engine
        env:
          DATABASE_URL: postgresql://aimo_test:aimo_test@localhost:5432/aimo_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ci_test_secret_not_for_production
          AIMO_ENV: test
          HALLUCINATION_SAMPLE_RATE: "1.0"
          COMPLIANCE_SHADOW_EVAL_RATE: "1.0"
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Golden dataset evaluation (must be ≥ 95%)
        working-directory: ai-engine
        run: python tests/run_eval.py

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ai-engine/coverage.xml
          flags: ai-engine
          fail_ci_if_error: false

  # ── Spring Boot Backend ───────────────────────────────────────
  test-backend:
    name: Backend Tests (Spring Boot / Java 17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run Spring Boot tests
        working-directory: backend
        env:
          JWT_SECRET: ci_test_secret_not_for_production
          AIMO_ALERT_WEBHOOK: ""
        run: mvn test -B -Dspring.profiles.active=test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # ── React Frontend ────────────────────────────────────────────
  lint-frontend:
    name: Frontend Type Check + Lint (React 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build (verify no compile errors)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_AI_ENGINE_URL: http://localhost:8001
          VITE_WS_URL: ws://localhost:8001/ws/incidents
        run: npm run build
