# ── Test profile — H2 in-memory, no real PostgreSQL needed ────
spring.datasource.url=jdbc:h2:mem:aimo_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway in unit tests (H2 DDL auto handles schema)
spring.flyway.enabled=false

# Redis — use embedded fake or skip (override in integration tests)
spring.data.redis.url=redis://localhost:6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

aimo.jwt.secret=test_secret_not_for_production_ci_only
aimo.jwt.expiration-ms=3600000
aimo.alert.webhook=
