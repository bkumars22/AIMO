spring.application.name=aimo-backend

# ── DataSource (PostgreSQL) ───────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aimo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:aimo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aimo_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ─────────────────────────────────────────────────────
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}

# ── Actuator (Docker healthcheck) ─────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── App-specific ──────────────────────────────────────────────
aimo.jwt.secret=${JWT_SECRET}
aimo.jwt.expiration-ms=86400000
aimo.alert.webhook=${AIMO_ALERT_WEBHOOK:}
aimo.ai-engine.url=${AIMO_AI_ENGINE_URL:http://localhost:8001}
